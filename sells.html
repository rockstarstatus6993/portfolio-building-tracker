<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sell List">
<meta name="theme-color" content="#ff4d4d">
<title>🔴 Master Sell List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0a0c12;color:#e0e0e0;min-height:100vh;padding:14px 12px 90px;}
.container{max-width:780px;margin:0 auto;}

.cash-banner{position:sticky;top:0;z-index:50;background:#0a0c12;padding:10px 0 8px;}
.cash-inner{background:linear-gradient(135deg,#1a0d0d,#0a0c12);border:1px solid #ff4d4d;border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;}
.ci-left .label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.5px;}
.ci-left .amount{font-size:32px;font-weight:800;color:#ff6b6b;letter-spacing:-1px;transition:all 0.3s;}
.ci-left .sub{font-size:9px;color:#555;margin-top:1px;}
.ci-right{text-align:right;}
.ci-right .label{font-size:10px;color:#555;}
.ci-right .done{font-size:20px;font-weight:800;color:#4ade80;}
.ci-right .total{font-size:10px;color:#555;}

.prog-wrap{background:#1e2130;border-radius:20px;height:5px;margin:8px 0 4px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#ff4d4d,#ff9900);border-radius:20px;transition:width 0.4s;width:0%;}
.prog-text{font-size:9px;color:#555;margin-bottom:12px;}
.prog-text span{color:#ff6b6b;font-weight:600;}

.sec-hdr{font-size:10px;color:#444;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin:14px 0 7px;padding-left:2px;display:flex;justify-content:space-between;align-items:center;}
.sec-count{color:#ff6b6b;font-size:9px;}

.sell-card{background:#13161f;border:1px solid #1e2130;border-radius:11px;margin-bottom:7px;overflow:hidden;}
.sell-row{display:flex;align-items:center;padding:11px 13px;cursor:pointer;user-select:none;}
.sell-row:active{background:#1a1d2e;}
.sell-row.checked{opacity:0.3;}
.sell-row.checked .sn{text-decoration:line-through;color:#333;}
.chkbox{width:22px;height:22px;border:2px solid #2a2d3e;border-radius:5px;margin-right:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.sell-row.checked .chkbox{background:#ff4d4d;border-color:#ff4d4d;}
.chkbox svg{display:none;}
.sell-row.checked .chkbox svg{display:block;}
.sinfo{flex:1;}
.sn{font-size:12px;color:#d0d0d0;font-weight:600;transition:all 0.2s;}
.sm{font-size:9px;color:#555;margin-top:2px;line-height:1.4;}
.stag{display:inline-block;font-size:7px;font-weight:700;padding:2px 5px;border-radius:8px;margin-right:3px;margin-top:3px;}
.t-fidelity{background:#0d1433;color:#a78bfa;border:1px solid #a78bfa;}
.t-cashapp{background:#0d2233;color:#38bdf8;border:1px solid #38bdf8;}
.t-stash{background:#0d2e0d;color:#4ade80;border:1px solid #4ade80;}
.t-acorns{background:#2e1f00;color:#f0a500;border:1px solid #f0a500;}
.t-overlap{background:#2e0d2e;color:#f472b6;border:1px solid #f472b6;}
.sv{font-size:13px;font-weight:700;color:#ff6b6b;white-space:nowrap;margin-left:8px;}
.sell-row.checked .sv{color:#333;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1d2e;border-top:1px solid #2a2d3e;display:flex;overflow-x:auto;z-index:100;}
.nav-btn{flex:1;padding:10px 6px;text-align:center;cursor:pointer;font-size:9px;color:#555;border:none;background:transparent;white-space:nowrap;}
.nav-btn .nav-icon{font-size:16px;display:block;margin-bottom:2px;}
.nav-btn.active{color:#ff6b6b;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.reset-btn{display:block;width:100%;margin-top:10px;padding:11px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;color:#555;font-size:11px;cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div class="container">

<div class="cash-banner">
  <div class="cash-inner">
    <div class="ci-left">
      <div class="label">💰 Cash Raised from Sells</div>
      <div class="amount" id="cashTotal">$0.00</div>
      <div class="sub" id="cashSub">Tap items as you sell them</div>
    </div>
    <div class="ci-right">
      <div class="label">Sold</div>
      <div class="done" id="doneCount">0</div>
      <div class="total" id="totalCount">of 0</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="prog-text"><span id="progPct">0%</span> complete · <span id="remainVal">$0</span> remaining</div>
</div>

<div id="tab-all" class="tab-content active"><div id="allList"></div><button class="reset-btn" onclick="resetAll()">↺ Reset All</button></div>
<div id="tab-fidelity" class="tab-content"><div id="fidelityList"></div><button class="reset-btn" onclick="resetSection('fidelity')">↺ Reset</button></div>
<div id="tab-cashapp" class="tab-content"><div id="cashappList"></div><button class="reset-btn" onclick="resetSection('cashapp')">↺ Reset</button></div>
<div id="tab-stash" class="tab-content"><div id="stashList"></div><button class="reset-btn" onclick="resetSection('stash')">↺ Reset</button></div>
<div id="tab-acorns" class="tab-content"><div id="acornsList"></div><button class="reset-btn" onclick="resetSection('acorns')">↺ Reset</button></div>
<div id="tab-overlap" class="tab-content"><div id="overlapList"></div><button class="reset-btn" onclick="resetSection('overlap')">↺ Reset</button></div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-all" onclick="showTab('all')"><span class="nav-icon">🔴</span>All</button>
  <button class="nav-btn" id="nav-fidelity" onclick="showTab('fidelity')"><span class="nav-icon">🏦</span>Fidelity</button>
  <button class="nav-btn" id="nav-cashapp" onclick="showTab('cashapp')"><span class="nav-icon">📱</span>Cash App</button>
  <button class="nav-btn" id="nav-stash" onclick="showTab('stash')"><span class="nav-icon">🌿</span>Stash</button>
  <button class="nav-btn" id="nav-acorns" onclick="showTab('acorns')"><span class="nav-icon">🌰</span>Acorns</button>
  <button class="nav-btn" id="nav-overlap" onclick="showTab('overlap')"><span class="nav-icon">⚠️</span>Overlaps</button>
</div>

<script>

  {id:'st8',n:'NVIDIA (overlap)',v:78.69,acct:'stash',reason:'Overlap with Cash App $1,393 position · Consolidate'},

  {id:'st10',n:'Meta Platforms (overlap)',v:28.02,acct:'stash',reason:'Overlap with Cash App $1,119 position · Consolidate'},
  {id:'st11',n:'Amazon (overlap)',v:13.46,acct:'stash',reason:'Overlap with Cash App $979 position · Consolidate'},
  {id:'st12',n:'Walmart (overlap)',v:12.04,acct:'stash',reason:'Overlap with Cash App $171 position · Consolidate'},

  {id:'st15',n:'Apple (overlap)',v:9.33,acct:'stash',reason:'Overlap with Cash App $665 position · Consolidate'},
  {id:'st16',n:'Alphabet/Google (overlap)',v:10.33,acct:'stash',reason:'Overlap with Cash App $19 position · Consolidate'},
  {id:'st17',n:'Zscaler (overlap)',v:1.24,acct:'stash',reason:'Down -58% · Also in Cash App · Sell Stash version'},
  {id:'st18',n:'Comcast',v:0.08,acct:'stash',reason:'Down -24% · Tiny · Media declining'},
  {id:'st19',n:'Kraft Heinz',v:0.07,acct:'stash',reason:'Down -33% · Consumer staple with debt issues'},
  {id:'st20',n:'American Vanguard Corp',v:2.38,acct:'stash',reason:'Down -52% · Specialty chemicals · Not core'},
  {id:'st21',n:'IAMGOLD Corporation',v:2.26,acct:'stash',reason:'Down -24% · Tiny gold miner · Covered by GDX'},

  // ACORNS INVEST
  {id:'ac1',n:'BITO — Bitcoin Strategy ETF',v:67.00,acct:'acorns',reason:'Speculative crypto ETF · Sell → roll into FBTC in Fidelity if wanted'},
  {id:'ac2',n:'Apple (AAPL) + NVIDIA (NVDA)',v:44.00,acct:'acorns',reason:'Custom adds · Overlap with Cash App positions · Sell or let transfer'},

  // OVERLAPS — Cash App vs Fidelity
  {id:'ov1',n:'MSFT — Fidelity $84 vs Cash App $432',v:84.48,acct:'overlap',reason:'Keep Cash App · Decide on Fidelity position after transfers settle'},
  {id:'ov2',n:'JNJ — Fidelity $121 + Cash App $40',v:40.31,acct:'overlap',reason:'Building JNJ in Fidelity per plan · Sell tiny Cash App position · Consolidate'},
  {id:'ov3',n:'VZ — Fidelity $83 + Cash App $31',v:31.64,acct:'overlap',reason:'Building VZ in Fidelity per plan · Sell tiny Cash App position · Consolidate'},
  {id:'ov4',n:'KO — Fidelity $91 + Cash App $228',v:91.31,acct:'overlap',reason:'Decide which account to hold KO · Currently split across both'},
  {id:'ov5',n:'COST — Fidelity $118 + Cash App $146',v:118.66,acct:'overlap',reason:'Already heavy Costco everywhere · Consider selling Fidelity position'},
  {id:'ov6',n:'PG — Fidelity $104 + Cash App $6',v:6.19,acct:'overlap',reason:'Sell tiny Cash App PG · Build Fidelity position'},
  {id:'ov7',n:'NEE — Fidelity $79 + Cash App $7',v:79.50,acct:'overlap',reason:'Poor buy/hold ratings · Consider selling both · Not in deploy plan'},
  {id:'ov8',n:'V — Fidelity $104 + Cash App $267',v:104.97,acct:'overlap',reason:'Keep Cash App V · Decide if Fidelity V should consolidate or stay separate'},
  {id:'ov9',n:'IAU/Gold — Fidelity $77 + Cash App $35',v:35.86,acct:'overlap',reason:'Gold in both accounts · Fine to hold or consolidate to one'},
  {id:'ov10',n:'Lockheed — Cash App $33 + Fidelity IRA',v:33.18,acct:'overlap',reason:'Tiny Cash App position · IRA transfer coming · Consider selling CA version'},
];

let sold = new Set();
try { const s=localStorage.getItem('selllist_v2'); if(s) sold=new Set(JSON.parse(s)); } catch(e){}
function persist(){ try{ localStorage.setItem('selllist_v2',JSON.stringify([...sold])); }catch(e){} }
function fmtF(v){ return '$'+parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

const tagMap={fidelity:{cls:'t-fidelity',lbl:'🏦 Fidelity'},cashapp:{cls:'t-cashapp',lbl:'📱 Cash App'},stash:{cls:'t-stash',lbl:'🌿 Stash'},acorns:{cls:'t-acorns',lbl:'🌰 Acorns'},overlap:{cls:'t-overlap',lbl:'⚠️ Overlap'}};

function updateStats(){
  let total=0,done=0,raised=0,remaining=0;
  allItems.forEach(i=>{ total++; if(sold.has(i.id)){done++;raised+=i.v;}else{remaining+=i.v;} });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('cashTotal').textContent=fmtF(raised);
  document.getElementById('doneCount').textContent=done;
  document.getElementById('totalCount').textContent='of '+total;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('remainVal').textContent=fmtF(remaining);
}

function toggle(id){
  if(sold.has(id)) sold.delete(id); else sold.add(id);
  persist();
  const row=document.getElementById('row-'+id);
  if(row) row.classList.toggle('checked',sold.has(id));
  updateStats();
}

function buildSection(items,container,title){
  if(title){
    const h=document.createElement('div');
    h.className='sec-hdr';
    const tv=items.reduce((a,i)=>a+i.v,0);
    h.innerHTML=`${title} <span class="sec-count">${items.length} items · ${fmtF(tv)}</span>`;
    container.appendChild(h);
  }
  items.forEach(item=>{
    const t=tagMap[item.acct];
    const div=document.createElement('div');
    div.className='sell-card';
    const checked=sold.has(item.id);
    div.innerHTML=`<div class="sell-row ${checked?'checked':''}" id="row-${item.id}" onclick="toggle('${item.id}')">
      <div class="chkbox"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="sinfo"><div class="sn">${item.n}</div><div class="sm"><span class="stag ${t.cls}">${t.lbl}</span> ${item.reason}</div></div>
      <div class="sv">${item.v>0?fmtF(item.v):'$0'}</div>
    </div>`;
    container.appendChild(div);
  });
}

const sections=[
  {key:'fidelity',label:'🏦 Fidelity — Sell Now'},
  {key:'cashapp',label:'📱 Cash App — Trim List'},
  {key:'stash',label:'🌿 Stash Personal — Sell & Overlaps'},
  {key:'acorns',label:'🌰 Acorns Invest — Sell'},
  {key:'overlap',label:'⚠️ Cross-Account Overlaps'},
];

function buildAll(){
  const c=document.getElementById('allList'); c.innerHTML='';
  sections.forEach(s=>{
    const items=allItems.filter(i=>i.acct===s.key);
    buildSection(items,c,s.label);
    const el=document.getElementById(s.key+'List');
    if(el){el.innerHTML='';buildSection(items,el,null);}
  });
  updateStats();
}

function resetAll(){sold.clear();persist();buildAll();}
function resetSection(acct){allItems.filter(i=>i.acct===acct).forEach(i=>sold.delete(i.id));persist();buildAll();}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
}

buildAll();

const _m={name:'Sell List',short_name:'Sell',start_url:'.',display:'standalone',background_color:'#0a0c12',theme_color:'#ff4d4d',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%230a0c12'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🔴%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
const _b=new Blob([JSON.stringify(_m)],{type:'application/json'});
const _l=document.createElement('link');_l.rel='manifest';_l.href=URL.createObjectURL(_b);document.head.appendChild(_l);
</script>
</body>
</html>
