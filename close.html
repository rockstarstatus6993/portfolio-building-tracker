<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Close Accounts">
<meta name="theme-color" content="#ff4d4d">
<title>🔒 Account Closure Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0a0c12;color:#e0e0e0;min-height:100vh;padding:14px 12px 40px;}
.container{max-width:780px;margin:0 auto;}
h1{font-size:20px;font-weight:800;color:#ff6b6b;margin-bottom:2px;}
.subtitle{color:#555;font-size:10px;margin-bottom:14px;}

/* BANNER */
.banner{background:linear-gradient(135deg,#1a0d0d,#0a0c12);border:1px solid #ff4d4d;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.b-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.5px;}
.b-val{font-size:28px;font-weight:800;color:#ff6b6b;}
.b-sub{font-size:11px;color:#888;margin-top:2px;}

/* PROGRESS */
.prog-wrap{background:#1e2130;border-radius:20px;height:6px;margin-bottom:4px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#ff4d4d,#ff9900);border-radius:20px;transition:width 0.4s;}
.prog-text{font-size:9px;color:#555;margin-bottom:14px;}
.prog-text span{color:#ff6b6b;font-weight:600;}

/* CARDS */
.card{background:#13161f;border:1px solid #1e2130;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:opacity 0.3s;}
.card.done{opacity:0.4;}
.card-header{display:flex;align-items:center;padding:13px 14px 10px;cursor:pointer;user-select:none;}
.card-header:active{background:#1a1d2e;}
.ch-check{width:24px;height:24px;border:2px solid #333;border-radius:6px;margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.card.done .ch-check{background:#ff4d4d;border-color:#ff4d4d;}
.ch-check svg{display:none;}
.card.done .ch-check svg{display:block;}
.ch-icon{font-size:22px;margin-right:10px;}
.ch-info{flex:1;}
.ch-name{font-size:14px;font-weight:700;color:#fff;}
.ch-status{font-size:9px;margin-top:2px;font-weight:600;}
.status-urgent{color:#ff6b6b;}
.status-progress{color:#f0a500;}
.status-done{color:#4ade80;}

.card-divider{height:1px;background:#1e2130;margin:0 14px;}
.card-body{padding:11px 14px 13px;}
.detail-row{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.tag{font-size:8px;font-weight:700;padding:3px 7px;border-radius:20px;letter-spacing:0.3px;}
.tag-warn{background:#2e1000;color:#ff9900;border:1px solid #ff9900;}
.tag-info{background:#0d1433;color:#a78bfa;border:1px solid #a78bfa;}
.tag-green{background:#0d2e0d;color:#4ade80;border:1px solid #4ade80;}
.tag-red{background:#2e0d0d;color:#ff6b6b;border:1px solid #ff6b6d;}
.steps{list-style:none;counter-reset:steps;}
.steps li{counter-increment:steps;font-size:11px;color:#8a8fa8;line-height:1.6;padding:4px 0 4px 22px;position:relative;border-bottom:1px solid #1e2130;}
.steps li:last-child{border-bottom:none;}
.steps li::before{content:counter(steps);position:absolute;left:0;top:5px;width:15px;height:15px;background:#1e2130;border-radius:50%;font-size:8px;font-weight:800;color:#555;display:flex;align-items:center;justify-content:center;line-height:1;}
.steps li strong{color:#c0c8ff;}
.warn-box{background:#1a0d0d;border:1px solid #ff4d4d;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:10px;color:#ff9999;line-height:1.5;}
.warn-box strong{color:#ff6b6b;}
.info-box{background:#0d1433;border:1px solid #a78bfa;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:10px;color:#c4b5fd;line-height:1.5;}

.reset-btn{display:block;width:100%;margin-top:14px;padding:11px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;color:#555;font-size:11px;cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div class="container">
<h1>🔒 Account Closure Tracker</h1>
<div class="subtitle">Close everything · Move to Fidelity · Simplify</div>

<div class="banner">
  <div>
    <div class="b-label">Accounts to Close</div>
    <div class="b-val" id="totalCount">10</div>
    <div class="b-sub">tap each card to mark closed</div>
  </div>
  <div style="text-align:right;">
    <div class="b-label">Closed</div>
    <div class="b-val" id="doneCount" style="color:#4ade80;">0</div>
    <div class="b-sub" id="remainCount">10 remaining</div>
  </div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
<div class="prog-text"><span id="progPct">0%</span> complete</div>

<div id="cardList"></div>
<button class="reset-btn" onclick="resetAll()">↺ Reset All</button>
</div>

<script>
const accounts = [
  {
    id:'stash',
    icon:'🌿',
    name:'Stash (3 accounts)',
    urgency:'In Progress',
    urgencyClass:'status-progress',
    tags:[{t:'3 Accounts',c:'tag-info'},{t:'ACATS Initiated',c:'tag-green'},{t:'Cancel Sub After',c:'tag-warn'}],
    steps:[
      '<strong>Personal, IRA & Smart Portfolio</strong> — all 3 transfers initiated to Fidelity',
      '<strong>Arriving ~July 7</strong> — wait for all positions to land in Fidelity',
      '<strong>Cancel $3/mo subscription</strong> once all transfers confirm settled',
      '<strong>Request account closure</strong> in Stash app under Settings → Support',
      '<strong>Confirm $0 balance</strong> before final closure'
    ],
    warn:'Do NOT cancel subscription before transfers settle — it may interrupt the ACATS process.'
  },
  {
    id:'robinhood',
    icon:'🟢',
    name:'Robinhood',
    urgency:'Waiting — 5 Day Hold',
    urgencyClass:'status-urgent',
    tags:[{t:'5-Day Hold Active',c:'tag-red'},{t:'1 Withdrawal/Week',c:'tag-warn'},{t:'Cancel Gold',c:'tag-green'}],
    steps:[
      '<strong>$509 cash hold</strong> — Robinhood holds ACH deposits for 5 business days before withdrawal',
      '<strong>1 withdrawal per week limit</strong> — plan your timing, can\'t rush multiple pulls',
      '<strong>Wait for hold to clear</strong> then initiate bank transfer',
      '<strong>Robinhood Gold already cancelled</strong> ✅',
      '<strong>Once $0 balance</strong> — go to Account → Settings → Deactivate Account',
      '<strong>Download your tax documents</strong> first — you\'ll lose access after closure'
    ],
    warn:'Download all 1099s and trade history BEFORE closing. Robinhood cuts access immediately on deactivation.'
  },
  {
    id:'coinbase',
    icon:'🔵',
    name:'Coinbase Exchange',
    urgency:'Close Exchange Only',
    urgencyClass:'status-progress',
    tags:[{t:'Exchange Only',c:'tag-warn'},{t:'Keep Wallet App',c:'tag-green'},{t:'$174 Sent',c:'tag-info'}],
    steps:[
      '<strong>$174 already sent to Fidelity</strong> ✅ — proceeds from sales',
      '<strong>Coinbase Wallet app is separate</strong> — keep it, it\'s non-custodial',
      '<strong>Only closing the Coinbase exchange account</strong> (coinbase.com login)',
      'Confirm $0 balance on exchange',
      'Go to Settings → Security → Close Account',
      '<strong>Save your transaction history</strong> for tax purposes before closing'
    ],
    info:'Coinbase Wallet is a separate app — closing the exchange does NOT affect your wallet.'
  },
  {
    id:'cryptocom',
    icon:'🔷',
    name:'Crypto.com',
    urgency:'Close — $45 Sent',
    urgencyClass:'status-progress',
    tags:[{t:'$45 Sent to Fidelity',c:'tag-green'},{t:'Confirm $0 Balance',c:'tag-warn'}],
    steps:[
      '<strong>$45 already sent to Fidelity</strong> ✅',
      'Log in and confirm all balances are $0',
      'Go to Settings → Account → Close Account',
      'Crypto.com may ask you to verify identity before closing',
      'Save transaction history for tax records'
    ],
    warn:'Crypto.com sometimes takes 3-5 business days to process account closure requests.'
  },
  {
    id:'acorns',
    icon:'🌰',
    name:'Acorns (2 accounts)',
    urgency:'In Progress',
    urgencyClass:'status-progress',
    tags:[{t:'Sub Cancelled',c:'tag-green'},{t:'Transfer Initiated',c:'tag-info'},{t:'Kids Closed',c:'tag-green'}],
    steps:[
      '<strong>Acorns Invest</strong> — ACATS transfer initiated to Fidelity ✅',
      '<strong>Acorns IRA</strong> — transfer initiated to Fidelity IRA ✅',
      '<strong>Kids Later account closed</strong> — ~$50 sent to bank ✅',
      '<strong>Subscription cancelled</strong> ✅',
      'Wait for positions to land in Fidelity (~7-10 business days)',
      'Once $0 balance confirmed, close remaining account shells through app Settings'
    ]
  },
  {
    id:'base',
    icon:'🔵',
    name:'Base (Coinbase L2)',
    urgency:'Close / Drain',
    urgencyClass:'status-urgent',
    tags:[{t:'L2 Network',c:'tag-info'},{t:'Bridge Out First',c:'tag-warn'}],
    steps:[
      '<strong>Base is a Layer 2 network</strong> — not an account per se, but a wallet address',
      'Open your Base wallet and check balance',
      '<strong>Bridge any remaining funds</strong> back to Ethereum mainnet or directly to Coinbase',
      'Send proceeds to bank or Fidelity',
      'Once drained, the address is effectively abandoned — no formal closure needed',
      'Revoke any active dApp permissions at revoke.cash for security'
    ],
    warn:'Don\'t leave dust amounts behind — even small balances can have gas fees that exceed the value to recover later.'
  },
  {
    id:'moomoo',
    icon:'🐄',
    name:'Moomoo',
    urgency:'Close Account',
    urgencyClass:'status-urgent',
    tags:[{t:'Check Balance',c:'tag-warn'},{t:'ACATS Eligible',c:'tag-info'}],
    steps:[
      'Log in and check current balance and positions',
      'If positions exist — initiate ACATS transfer to Fidelity',
      'If cash only — withdraw to bank then transfer to Fidelity',
      'Once $0 balance — go to Me → Settings → Account → Close Account',

      'Moomoo may offer incentives to stay — decline and proceed'
    ],
    info:'Moomoo sometimes offers free stock bonuses — if you have any unvested, they disappear on closure.'
  },
  {
    id:'webull',
    icon:'📈',
    name:'Webull',
    urgency:'Closing — $46.70 Initiated',
    urgencyClass:'status-progress',
    tags:[{t:'$46.70 Withdrawal Initiated',c:'tag-green'},{t:'3-5 Days',c:'tag-warn'},{t:'Sell All First',c:'tag-red'}],
    steps:[
      '<strong>Sell JAAA, TGTX, TBA, GNW</strong> — all 4 positions, do this first',
      '<strong>$2.31 cash balance</strong> — will be included in withdrawal',
      '<strong>$46.70 withdrawal initiated</strong> ✅ — arriving in 3-5 business days',
      'Once $0 balance confirmed — go to Me → Settings → Account Security → Close Account',
      'Webull requires all positions sold and $0 balance before closure is allowed',
      'Save tax documents before closing'
    ],
    warn:'Webull\'s TBA position ($0.00) may need to be manually removed or abandoned before closure is allowed.'
  },
  {
    id:'yelpads',
    icon:'⭐',
    name:'Yelp Business Ads',
    urgency:'Cancel — Poor ROI',
    urgencyClass:'status-urgent',
    tags:[{t:'Poor ROI',c:'tag-red'},{t:'Cancel ASAP',c:'tag-warn'},{t:'Keep Free Listing',c:'tag-green'}],
    steps:[
      'Log into <strong>biz.yelp.com</strong> with your Dockless Marine credentials',
      'Go to <strong>Advertising → Manage Ads</strong>',
      'Pause or cancel the active ad campaign',
      '<strong>Keep your free Yelp business listing</strong> — just stop paying for ads',
      'Note the cancellation date for billing — check for any outstanding charges',
      '<strong>Redirect that ad budget</strong> to Google Ads which has better ROI for marine services'
    ],
    warn:'Yelp ads auto-renew. Cancel before your next billing date to avoid another charge. Keep the free listing active for reviews.'
  },
  {
    id:'netlify',
    icon:'🌐',
    name:'Netlify (bumblebe)',
    urgency:'Migrate to GitHub Pages',
    urgencyClass:'status-progress',
    tags:[{t:'Migrated to GitHub',c:'tag-green'},{t:'Cancel Free Plan',c:'tag-info'}],
    steps:[
      '<strong>All 3 HTML files now on GitHub Pages</strong> ✅',
      'Confirm all 3 URLs working on GitHub Pages',
      'Log into Netlify and delete the bumblebe site',
      'If on a paid plan — cancel billing under Team Settings → Billing',
      'If on free plan — can leave or delete, no charge either way',
      'Update any saved bookmarks to new GitHub Pages URLs'
    ]
  }
];

let closed = new Set();
try { const s = localStorage.getItem('close_accounts'); if(s) closed = new Set(JSON.parse(s)); } catch(e){}

function persist(){ try{ localStorage.setItem('close_accounts', JSON.stringify([...closed])); }catch(e){} }

function updateProgress(){
  const total = accounts.length;
  const done = closed.size;
  const pct = Math.round(done/total*100);
  document.getElementById('doneCount').textContent = done;
  document.getElementById('remainCount').textContent = (total-done) + ' remaining';
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
}

function toggleCard(id){
  if(closed.has(id)) closed.delete(id); else closed.add(id);
  persist();
  document.getElementById('card-'+id).classList.toggle('done', closed.has(id));
  updateProgress();
}

function buildCards(){
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  accounts.forEach(a => {
    const div = document.createElement('div');
    div.className = 'card' + (closed.has(a.id) ? ' done' : '');
    div.id = 'card-' + a.id;
    const tagsHTML = a.tags.map(t => `<span class="tag ${t.c}">${t.t}</span>`).join('');
    const stepsHTML = a.steps.map(s => `<li>${s}</li>`).join('');
    const warnHTML = a.warn ? `<div class="warn-box"><strong>⚠️ Note:</strong> ${a.warn}</div>` : '';
    const infoHTML = a.info ? `<div class="info-box"><strong>ℹ️ Note:</strong> ${a.info}</div>` : '';
    div.innerHTML = `
      <div class="card-header" onclick="toggleCard('${a.id}')">
        <div class="ch-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="ch-icon">${a.icon}</div>
        <div class="ch-info">
          <div class="ch-name">${a.name}</div>
          <div class="ch-status ${a.urgencyClass}">${a.urgency}</div>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="detail-row">${tagsHTML}</div>
        <ul class="steps">${stepsHTML}</ul>
        ${warnHTML}${infoHTML}
      </div>`;
    list.appendChild(div);
  });
  updateProgress();
}

function resetAll(){ closed.clear(); persist(); buildCards(); }

buildCards();

// PWA
const _m={name:'Close Accounts',short_name:'Close',start_url:'.',display:'standalone',background_color:'#0a0c12',theme_color:'#ff4d4d',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%230a0c12'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🔒%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
const _b=new Blob([JSON.stringify(_m)],{type:'application/json'});
const _l=document.createElement('link');_l.rel='manifest';_l.href=URL.createObjectURL(_b);document.head.appendChild(_l);
</script>
</body>
</html>
